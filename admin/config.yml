backend:
  name: git-gateway
  branch: main

locale: de
publish_mode: simple
media_folder: "assets/images/news"
public_folder: "/assets/images/news"

collections:
  - name: "news"
    label: "News"
    label_singular: "News-Beitrag"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} – {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Veröffentlichungsdatum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Kurzbeschreibung", name: "description", widget: "text" }
      - { label: "Titelbild", name: "image", widget: "image", required: false }
      - { label: "Veröffentlicht", name: "published", widget: "boolean", default: true }
      - { label: "Inhalt", name: "body", widget: "markdown" }
