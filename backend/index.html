<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Adminbackend | ThurSky</title><link rel="stylesheet" href="/assets/css/style.css"></head><body>
<header class="site-header"><a class="brand" href="/"><img src="/assets/images/logo.png" alt="ThurSky Logo"><span>Adminbackend</span></a><nav class="desktop-nav"><a href="/admin/">News bearbeiten</a><a href="/">Website</a><button class="nav-button" id="logoutButton">Abmelden</button></nav></header>
<main class="page-shell"><section class="hero-small"><p class="eyebrow">Verwaltung</p><h1>Bestellungen und Kunden</h1><p id="adminIdentity">Berechtigung wird geprüft …</p></section><div id="adminMessage"></div><div class="dashboard-grid section"><aside class="card sidebar"><nav><button class="active" data-view="orders">Bestellungen</button><button data-view="customers">Kunden</button><button data-view="new-order">Neue Bestellung</button></nav></aside><section>
<div id="view-orders" class="admin-view"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2>Bestellungen</h2><button class="btn btn-secondary btn-small" id="refreshOrders">Aktualisieren</button></div><div class="table-wrap"><table><thead><tr><th>Nummer</th><th>Kunde</th><th>Leistung</th><th>Status</th><th>Aktion</th></tr></thead><tbody id="ordersTable"></tbody></table></div></div><div id="orderEditor"></div></div>
<div id="view-customers" class="admin-view hidden"><div class="card"><h2>Identity-Benutzer</h2><div class="table-wrap"><table><thead><tr><th>E-Mail</th><th>ID</th><th>Rollen</th></tr></thead><tbody id="customersTable"></tbody></table></div></div></div>
<div id="view-new-order" class="admin-view hidden"><form class="card" id="newOrderForm"><h2>Neue Bestellung</h2><div class="form-grid"><div class="field field-full"><label>Kunde *</label><select id="newCustomer" required></select></div><div class="field"><label>Leistung *</label><input id="newPackage" required></div><div class="field"><label>Status</label><select id="newStatus"><option value="received">Anfrage eingegangen</option><option value="planning">Termin wird geplant</option><option value="confirmed">Termin bestätigt</option><option value="recorded">Aufnahmen erstellt</option><option value="editing">In Bearbeitung</option><option value="ready">Bereit zum Download</option><option value="completed">Abgeschlossen</option><option value="cancelled">Storniert</option></select></div><div class="field"><label>Wunschdatum</label><input id="newDesiredDate" type="date"></div><div class="field field-full"><label>Nachricht an Kunden</label><textarea id="newAdminMessage"></textarea></div></div><button class="btn btn-primary" type="submit">Bestellung erstellen</button></form></div>
</section></div></main><script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script><script type="module" src="/assets/js/admin.js"></script></body></html>
