</footer><script>
(function(){
 const btn=document.getElementById('menuToggle'); const nav=document.getElementById('mainNav');
 if(btn&&nav){
  const close=()=>{nav.classList.remove('open');btn.setAttribute('aria-expanded','false');btn.textContent='☰'};
  btn.addEventListener('click',e=>{e.stopPropagation();const open=nav.classList.toggle('open');btn.setAttribute('aria-expanded',String(open));btn.textContent=open?'✕':'☰'});
  nav.addEventListener('click',e=>{if(e.target.closest('a'))close()});
  document.addEventListener('click',e=>{if(!nav.contains(e.target)&&e.target!==btn)close()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});
 }
})();
</script></body></html>
