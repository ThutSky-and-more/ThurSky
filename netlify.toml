[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/konto/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/backend/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
